groups:
  - name: network_synapse_alerts
    rules:
      # -----------------------------------------------------------------------
      # BGP session alerts
      # -----------------------------------------------------------------------
      - alert: BGPSessionDown
        expr: bgp_session_state{state!="established"} == 1
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "BGP session {{ $labels.peer }} on {{ $labels.device }} is DOWN"
          description: >-
            The BGP session to peer {{ $labels.peer }} on device
            {{ $labels.device }} has been in state {{ $labels.state }}
            for more than 2 minutes.

      # -----------------------------------------------------------------------
      # Node reachability alerts
      # -----------------------------------------------------------------------
      - alert: NetworkDeviceUnreachable
        expr: probe_success{job="network_devices"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Network device {{ $labels.instance }} is UNREACHABLE"
          description: >-
            The network device {{ $labels.instance }} has been unreachable
            for more than 1 minute. Check physical connectivity or SSH/gNMI
            access.

      # -----------------------------------------------------------------------
      # Interface flap detection
      # -----------------------------------------------------------------------
      - alert: InterfaceFlapDetected
        expr: rate(interface_state_changes_total[5m]) > 3
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Interface {{ $labels.interface }} on {{ $labels.device }} is FLAPPING"
          description: >-
            Interface {{ $labels.interface }} on {{ $labels.device }} has
            changed state more than 3 times in the last 5 minutes. This
            indicates instability.

      # -----------------------------------------------------------------------
      # Temporal workflow failure alerts
      # -----------------------------------------------------------------------
      - alert: TemporalWorkflowFailureRate
        expr: >-
          rate(temporal_workflow_completed{status="failed"}[10m])
            /
          rate(temporal_workflow_completed[10m]) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High Temporal workflow failure rate"
          description: >-
            More than 50% of Temporal workflows have failed in the last
            10 minutes. Check the Temporal UI for details.

      # -----------------------------------------------------------------------
      # Infrahub connectivity alert
      # -----------------------------------------------------------------------
      - alert: InfrahubApiDown
        expr: probe_success{job="infrahub"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Infrahub API is DOWN"
          description: >-
            The Infrahub source-of-truth API has been unreachable for more
            than 2 minutes. Configuration generation workflows will fail.

  # ---------------------------------------------------------------------------
  # Epic E alert conditions (Issue #80)
  # ---------------------------------------------------------------------------
  # Severity routing is handled by alertmanager.yml (critical -> immediate
  # Slack, warning -> batched, info -> default channel).
  #
  # Metric sources:
  #   up{}                                  -- Prometheus scrape health (prometheus.yml)
  #   temporal_worker_task_slots_available  -- Temporal SDK worker metrics
  #   override_revert_failures_total        -- override revert activity counter (#63)
  #   intent_orphaned_rules_count           -- worker intent metrics (#62, synapse_worker job)
  #   drift_score                           -- SuzieQ custom exporter (#74)
  #   intent_lineage_completeness_ratio     -- worker intent metrics (#62, synapse_worker job)
  #   suzieq_last_poll_timestamp_seconds    -- SuzieQ custom exporter (#74)
  #   support_tickets_opened_total          -- Golden Path adoption metrics (#77)

  - name: platform_health
    rules:
      - alert: PlatformDown
        expr: up{job=~"infrahub|temporal"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.job }} is down"
          description: >-
            Prometheus has been unable to scrape {{ $labels.job }}
            ({{ $labels.instance }}) for 2 minutes. The automation platform
            cannot function without it. See docs/runbooks.md.

      - alert: WorkerSaturation
        expr: temporal_worker_task_slots_available{worker_type="WorkflowWorker"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Temporal worker has no free workflow task slots"
          description: >-
            The Temporal worker ({{ $labels.instance }}) has had zero
            available workflow task slots for 5 minutes. Workflow starts
            are queueing; consider scaling workers or investigating stuck
            workflows.

  - name: intent_compliance
    rules:
      - alert: OverrideRevertFailed
        expr: increase(override_revert_failures_total[15m]) > 0
        for: 0s
        labels:
          severity: critical
        annotations:
          summary: "Operational override revert failed on {{ $labels.device }}"
          description: >-
            An override revert failed in the last 15 minutes. The device may
            be running non-intended config indefinitely. Manual intervention
            required — see docs/runbooks.md.

      - alert: OrphanedRulesIncreasing
        expr: delta(intent_orphaned_rules_count[1h]) > 0
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Orphaned rule count is increasing"
          description: >-
            The number of deployed config rules with no owning intent has been
            rising for the last hour ({{ $value }} new orphans). Run the
            hygiene checker to identify and reap them.

      - alert: DriftScoreElevated
        expr: drift_score > 0.2
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Config drift elevated on {{ $labels.device }}"
          description: >-
            Drift score for {{ $labels.device }} has exceeded 0.2 for
            10 minutes (current: {{ $value }}). Running config is diverging
            from Infrahub intended state; drift remediation may be failing or
            overrides may be accumulating.

      - alert: LineageCoverageDrop
        expr: intent_lineage_completeness_ratio < 0.95
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Intent lineage coverage below 95%"
          description: >-
            Less than 95% of deployed config traces back to a business or
            operational intent (current: {{ $value | humanizePercentage }}).
            New unmanaged config may have been applied outside the platform.

  - name: telemetry_health
    rules:
      - alert: SuzieQStale
        expr: time() - suzieq_last_poll_timestamp_seconds > 900
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "SuzieQ poller data is stale"
          description: >-
            SuzieQ has not completed a successful device poll in over
            20 minutes (15-minute staleness threshold plus 5 minutes
            pending). Drift detection and state validation are operating
            on stale data.

  - name: adoption
    rules:
      - alert: HighSupportTicketRate
        expr: rate(support_tickets_opened_total[1d]) * 86400 > 5
        for: 1h
        labels:
          severity: info
        annotations:
          summary: "Support ticket rate above 5/day"
          description: >-
            More than 5 network-automation support tickets per day over the
            last 24 hours. The Golden Path may have a usability gap — review
            recent tickets for common themes.
