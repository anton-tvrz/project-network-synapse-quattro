global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert_rules.yml"

scrape_configs:
  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Infrahub API health
  - job_name: "infrahub"
    metrics_path: /api/health
    static_configs:
      - targets: ["infrahub-server:8000"]

  # Temporal server metrics
  - job_name: "temporal"
    static_configs:
      - targets: ["temporal:7233"]

  # Synapse Temporal worker — intent lifecycle metrics (runs on the host)
  - job_name: "synapse_worker"
    static_configs:
      - targets: ["host.docker.internal:9464"]

  # Streaming gNMI telemetry from the containerlab fabric (Issue #169).
  # gnmic subscribes to interface + BGP state and re-exports it here with
  # normalized device-name labels (source="spine01"...).
  - job_name: "gnmic"
    static_configs:
      - targets: ["gnmic:9273"]
