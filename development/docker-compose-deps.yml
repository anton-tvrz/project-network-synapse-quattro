# Infrastructure dependencies only — no app containers
# Usage: docker compose -f development/docker-compose-deps.yml up -d
# Or: uv run invoke dev.deps
#
# Based on official Infrahub docker-compose: https://infrahub.opsmill.io
#
# Resource budget for MacBook M5 32GB (~10GB reserved, ~22GB for macOS/IDE/Containerlab):
#   Infrahub stack:  ~5GB (Neo4j 2G, server 1G, task-manager 512M, task-worker 1G, Postgres 256M)
#   Supporting:      ~2GB (Redis 256M, RabbitMQ 512M, Temporal 1G, Temporal DB 256M)
#   Observability:   ~1GB (Prometheus 512M, Grafana 256M)

x-infrahub-env: &infrahub-env
  INFRAHUB_DB_TYPE: neo4j
  INFRAHUB_DB_ADDRESS: infrahub-database
  INFRAHUB_DB_PORT: 7687
  INFRAHUB_DB_USERNAME: neo4j
  INFRAHUB_DB_PASSWORD: infrahub
  INFRAHUB_CACHE_ADDRESS: infrahub-cache
  INFRAHUB_CACHE_PORT: 6379
  INFRAHUB_BROKER_ADDRESS: infrahub-message-queue
  INFRAHUB_BROKER_PORT: 5672
  INFRAHUB_BROKER_USERNAME: guest
  INFRAHUB_BROKER_PASSWORD: guest
  INFRAHUB_WORKFLOW_ADDRESS: infrahub-task-manager
  INFRAHUB_WORKFLOW_PORT: 4200
  INFRAHUB_INITIAL_ADMIN_TOKEN: 06438eb2-8019-4776-878c-0941b1f1d1ec
  INFRAHUB_INITIAL_AGENT_TOKEN: 44af444d-3b26-410d-9546-b758657e026c
  PREFECT_API_URL: http://infrahub-task-manager:4200/api

services:
  # ---------------------------------------------------------------------------
  # Infrahub stack (5 containers)
  # Ref: https://docs.infrahub.app/guides/installation/
  # ---------------------------------------------------------------------------
  infrahub-database:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/infrahub
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
    ports:
      - "${NEO4J_PORT:-7687}:7687"
      - "${NEO4J_HTTP_PORT:-7474}:7474"
    volumes:
      - neo4j_data:/data
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"

  infrahub-cache:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  infrahub-message-queue:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  infrahub-task-manager-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: prefect
      POSTGRES_PASSWORD: prefect
      POSTGRES_DB: prefect
    volumes:
      - infrahub_task_manager_db_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  infrahub-task-manager:
    image: registry.opsmill.io/opsmill/infrahub:stable
    command: >
      uvicorn --host 0.0.0.0 --port 4200
      --factory infrahub.prefect_server.app:create_infrahub_prefect
    depends_on:
      - infrahub-task-manager-db
    environment:
      <<: *infrahub-env
      PREFECT_API_DATABASE_CONNECTION_URL: "postgresql+asyncpg://prefect:prefect@infrahub-task-manager-db:5432/prefect"
    ports:
      - "${TASK_MANAGER_PORT:-4200}:4200"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  infrahub-server:
    image: registry.opsmill.io/opsmill/infrahub:stable
    command: infrahub server start
    depends_on:
      - infrahub-database
      - infrahub-cache
      - infrahub-message-queue
      - infrahub-task-manager
    environment:
      <<: *infrahub-env
    ports:
      - "${INFRAHUB_PORT:-8000}:8000"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  infrahub-task-worker:
    image: registry.opsmill.io/opsmill/infrahub:stable
    command: prefect worker start --type infrahubasync --pool infrahub-worker --with-healthcheck
    restart: on-failure
    depends_on:
      - infrahub-server
    environment:
      <<: *infrahub-env
      INFRAHUB_ADDRESS: http://infrahub-server:8000
      INFRAHUB_INTERNAL_ADDRESS: http://infrahub-server:8000
      INFRAHUB_API_TOKEN: 44af444d-3b26-410d-9546-b758657e026c
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  # ---------------------------------------------------------------------------
  # Temporal stack (3 containers)
  # ---------------------------------------------------------------------------
  temporal-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    volumes:
      - temporal_db_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  temporal:
    image: temporalio/auto-setup:latest
    depends_on:
      - temporal-db
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: temporal-db
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/docker.yaml
    ports:
      - "${TEMPORAL_PORT:-7233}:7233"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  temporal-ui:
    image: temporalio/ui:latest
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    ports:
      - "${TEMPORAL_UI_PORT:-8080}:8080"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  # ---------------------------------------------------------------------------
  # Telemetry & Observability stack
  # ---------------------------------------------------------------------------
  # suzieq:
  #   # NOTE: SuzieQ image is linux/amd64 only — broken on Apple Silicon.
  #   # Re-enable when an ARM-compatible image is available.
  #   image: netenglabs/suzieq:latest
  #   platform: linux/amd64
  #   container_name: suzieq
  #   ports:
  #     - "8530:8530"
  #     - "8531:8531"
  #   volumes:
  #     - ./suzieq/suzieq-inventory.yml:/suzieq/suzieq-inventory.yml:ro
  #     - suzieq_parquet:/suzieq/parquet
  #   command: "sq-poller -I /suzieq/suzieq-inventory.yml"

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    depends_on:
      - prometheus
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: synapse
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/network-operations.json
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

volumes:
  neo4j_data:
  infrahub_task_manager_db_data:
  temporal_db_data:
  # suzieq_parquet:
  prometheus_data:
  grafana_data:
