# Gitleaks configuration — secrets detection
# https://github.com/gitleaks/gitleaks

title = "Project Network Synapse 3 — Gitleaks Config"

[extend]
# Use the default gitleaks rules as a base
useDefault = true

[allowlist]
description = "Known safe patterns"
paths = [
    '''\.venv/''',
    '''library/''',
    '''uv\.lock''',
    '''development/docker-compose.*\.yml''',
    '''\.secrets\.baseline''',
]

# Allow test fixture IPs (not real infrastructure)
regexTarget = "match"
regexes = [
    '''172\.20\.20\.\d+''',   # Containerlab management network (test fixtures)
    '''10\.0\.0\.\d+''',      # Fabric p2p addresses (test fixtures)
    # Deterministic Infrahub bootstrap tokens (see development/docker-compose-deps.yml
    # and development/docker-compose-ci.yml). Not real credentials — they only exist
    # so CI scripts and local dev can authenticate against a freshly-booted Infrahub.
    '''06438eb2-8019-4776-878c-0941b1f1d1ec''',
    '''44af444d-3b26-410d-9546-b758657e026c''',
    # Suzieq REST API dev key (the well-known key from Suzieq's own docs).
    # Localhost-bound dev stack only — see development/suzieq/suzieq-cfg.yml.
    '''496157e6e869ef7f3d6ecb24a6f6d847b224ee4f''',  # pragma: allowlist secret
]
