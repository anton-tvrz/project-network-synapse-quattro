# Reusable quality checks — called by pr-validation.yml
#
# This workflow consolidates all code quality, security, and test jobs
# into a single reusable component. Callers use workflow_call to invoke it.
#
# Usage:
#   jobs:
#     quality:
#       uses: ./.github/workflows/quality.yml
#       permissions:
#         contents: read
#         security-events: write
#       secrets: inherit
name: Quality Checks

on:
  workflow_call:
    inputs:
      run-integration-hygiene:
        description: "Run offline integration tests (hygiene only)"
        type: boolean
        default: false
    secrets:
      CODECOV_TOKEN:
        required: false

env:
  PYTHON_VERSION: "3.12"
  UV_VERSION: "latest"

jobs:
  # ---------------------------------------------------------------------------
  # Detect which files changed to conditionally run jobs
  # ---------------------------------------------------------------------------
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
      backend: ${{ steps.filter.outputs.backend }}
      workers: ${{ steps.filter.outputs.workers }}
      yaml: ${{ steps.filter.outputs.yaml }}
      documentation: ${{ steps.filter.outputs.documentation }}
      schemas: ${{ steps.filter.outputs.schemas }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: .github/file-filters.yml

  # ---------------------------------------------------------------------------
  # Code quality — ruff lint + format + mypy
  # ---------------------------------------------------------------------------
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.python == 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Ruff lint check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: MyPy type checking
        run: uv run mypy backend/ workers/
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # YAML lint
  # ---------------------------------------------------------------------------
  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.yaml == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --group linting

      - name: YAML lint
        run: uv run yamllint .

  # ---------------------------------------------------------------------------
  # Security scanning — bandit (HARD GATE) + SARIF upload
  # ---------------------------------------------------------------------------
  security-scanning:
    name: Security Scanning
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.python == 'true'
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: Bandit security scan
        run: |
          uv run bandit -r backend/ workers/ -c pyproject.toml -f json -o bandit-report.json || true
          uv run bandit -r backend/ workers/ -c pyproject.toml -f sarif -o bandit-results.sarif

      - name: Upload SARIF results to GitHub
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: bandit-results.sarif

  # ---------------------------------------------------------------------------
  # Secrets detection — gitleaks
  # ---------------------------------------------------------------------------
  secrets-detection:
    name: Secrets Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  # ---------------------------------------------------------------------------
  # uv lock check — verify lock file is in sync
  # ---------------------------------------------------------------------------
  uv-lock-check:
    name: uv Lock Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}

      - name: Verify uv.lock is in sync
        run: uv lock --check

  # ---------------------------------------------------------------------------
  # Unit tests
  # ---------------------------------------------------------------------------
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.python == 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run unit tests
        run: |
          uv run pytest tests/unit/ -v \
            --cov=backend/network_synapse --cov=workers/synapse_workers \
            --cov-report=xml \
            --cov-report=term-missing \
            --junitxml=test-results.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: coverage.xml
          fail_ci_if_error: false

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results
          path: test-results.xml

  # ---------------------------------------------------------------------------
  # Integration tests (offline hygiene only) — opt-in via input
  # ---------------------------------------------------------------------------
  integration-hygiene:
    name: Integration Tests (Hygiene)
    runs-on: ubuntu-latest
    needs: [unit-tests]
    if: inputs.run-integration-hygiene
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run integration tests (offline only)
        run: |
          # Only run integration tests that don't need live infra.
          # Tests marked @pytest.mark.integration that require Infrahub/Containerlab
          # are skipped here — they require live Infrahub/Containerlab infrastructure.
          uv run pytest tests/integration/ -v --timeout=60 \
            -k "hygiene" \
            --tb=short

  # ---------------------------------------------------------------------------
  # Schema validation — loads schemas and seed data into a test Infrahub
  # ---------------------------------------------------------------------------
  schema-validation:
    name: Schema Validation
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: [changes]
    if: needs.changes.outputs.schemas == 'true' || needs.changes.outputs.backend == 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Start Infrahub stack
        run: docker compose -f development/docker-compose-ci.yml up -d

      - name: Wait for Infrahub health
        run: |
          echo "Waiting for Infrahub to be ready..."
          for i in $(seq 1 180); do
            if curl -sf http://localhost:8000/api/schema/summary > /dev/null 2>&1; then
              echo "Infrahub ready after ${i}s"
              break
            fi
            if [ "$i" -eq 180 ]; then
              echo "Infrahub did not become ready in 180s"
              docker compose -f development/docker-compose-ci.yml logs infrahub-server
              exit 1
            fi
            sleep 1
          done

      - name: Load schemas
        run: |
          uv run python backend/network_synapse/schemas/load_schemas.py \
            --url http://localhost:8000

      - name: Seed data (small topology)
        run: |
          uv run python backend/network_synapse/data/populate_sot.py \
            --url http://localhost:8000 \
            --seed-file backend/network_synapse/data/seed_small.yml

      - name: Validate schema summary
        run: |
          curl -sf http://localhost:8000/api/schema/summary | python -m json.tool

      - name: Stop Infrahub stack
        if: always()
        run: docker compose -f development/docker-compose-ci.yml down -v

  # ---------------------------------------------------------------------------
  # Integration tests (Infrahub) — runs against a real Infrahub instance
  # ---------------------------------------------------------------------------
  integration-infrahub:
    name: Integration Tests (Infrahub)
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: [unit-tests, changes]
    if: needs.changes.outputs.backend == 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Start Infrahub stack
        run: docker compose -f development/docker-compose-ci.yml up -d

      - name: Wait for Infrahub health
        run: |
          echo "Waiting for Infrahub to be ready..."
          for i in $(seq 1 180); do
            if curl -sf http://localhost:8000/api/schema/summary > /dev/null 2>&1; then
              echo "Infrahub ready after ${i}s"
              break
            fi
            if [ "$i" -eq 180 ]; then
              echo "Infrahub did not become ready in 180s"
              exit 1
            fi
            sleep 1
          done

      - name: Load schemas
        run: |
          uv run python backend/network_synapse/schemas/load_schemas.py \
            --url http://localhost:8000

      - name: Seed data (small topology)
        run: |
          uv run python backend/network_synapse/data/populate_sot.py \
            --url http://localhost:8000 \
            --seed-file backend/network_synapse/data/seed_small.yml

      - name: Run integration tests
        env:
          INFRAHUB_URL: http://localhost:8000
        run: |
          uv run pytest tests/integration/ -v -m integration \
            --timeout=120 --tb=short

      - name: Stop Infrahub stack
        if: always()
        run: docker compose -f development/docker-compose-ci.yml down -v

  # ---------------------------------------------------------------------------
  # Quality gate — aggregates all job results
  # ---------------------------------------------------------------------------
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    permissions: {}
    needs:
      - changes
      - code-quality
      - yaml-lint
      - security-scanning
      - secrets-detection
      - uv-lock-check
      - unit-tests
      - integration-hygiene
      - schema-validation
      - integration-infrahub
    if: always()
    steps:
      - name: Check job results
        run: |
          echo "## Quality Gate Summary"
          echo ""
          echo "| Job | Status |"
          echo "|-----|--------|"
          echo "| Changes | ${{ needs.changes.result }} |"
          echo "| Code Quality | ${{ needs.code-quality.result }} |"
          echo "| YAML Lint | ${{ needs.yaml-lint.result }} |"
          echo "| Security Scanning | ${{ needs.security-scanning.result }} |"
          echo "| Secrets Detection | ${{ needs.secrets-detection.result }} |"
          echo "| uv Lock Check | ${{ needs.uv-lock-check.result }} |"
          echo "| Unit Tests | ${{ needs.unit-tests.result }} |"
          echo "| Integration Hygiene | ${{ needs.integration-hygiene.result }} |"
          echo "| Schema Validation | ${{ needs.schema-validation.result }} |"
          echo "| Integration (Infrahub) | ${{ needs.integration-infrahub.result }} |"
          echo ""

          # Fail if any required job failed (skipped is OK — means path filter excluded it)
          if [[ "${{ needs.changes.result }}" == "failure" ]] || \
             [[ "${{ needs.code-quality.result }}" == "failure" ]] || \
             [[ "${{ needs.yaml-lint.result }}" == "failure" ]] || \
             [[ "${{ needs.security-scanning.result }}" == "failure" ]] || \
             [[ "${{ needs.secrets-detection.result }}" == "failure" ]] || \
             [[ "${{ needs.uv-lock-check.result }}" == "failure" ]] || \
             [[ "${{ needs.unit-tests.result }}" == "failure" ]] || \
             [[ "${{ needs.integration-hygiene.result }}" == "failure" ]] || \
             [[ "${{ needs.schema-validation.result }}" == "failure" ]] || \
             [[ "${{ needs.integration-infrahub.result }}" == "failure" ]]; then
            echo "Required quality checks failed — blocking pipeline."
            exit 1
          fi

          echo "All quality checks passed."
