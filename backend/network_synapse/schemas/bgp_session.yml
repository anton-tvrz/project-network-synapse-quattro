# Infrahub schema: BGP Session for Synapse project
# Uses the schema-library routing_bgp extension directly
# This file documents the schema dependency chain for the project
#
# Load order (handled by infrahub/schemas/load_schemas.py):
#   1. library/schema-library/extensions/vrf/vrf.yml          -> IpamVRF, IpamRouteTarget
#   2. library/schema-library/extensions/routing/routing.yml   -> RoutingProtocol (generic)
#   3. library/schema-library/extensions/routing_bgp/bgp.yml
#      -> RoutingAutonomousSystem, RoutingBGPPeerGroup, RoutingBGPSession
#   4. infrahub/schemas/network_device.yml
#      -> DcimDevice extensions (management_ip, lab_node_name, asn)
#   5. infrahub/schemas/network_interface.yml
#      -> InterfacePhysical extensions (role)
#
# The routing_bgp extension provides:
#   - RoutingAutonomousSystem: ASN with name, number, organization, location, devices
#   - RoutingBGPPeerGroup: Reusable BGP peer group parameters
#   - RoutingBGPSession: Point-to-point BGP session with local/remote AS, IPs, device, peer_group
#   - Extension to DcimGenericDevice: adds 'asn' relationship
#   - Extension to OrganizationGeneric: adds 'asn' relationship
#
# The schema-library extension covers the session modeling itself; this file
# adds the project's intent metadata attributes (Issue #155) on top.
---
# yaml-language-server: $schema=https://schema.infrahub.app/infrahub/schema/latest.json
version: "1.0"

extensions:
  nodes:
    - kind: RoutingBGPSession
      attributes:
        # Intent metadata (Issue #155): ownership, origin, validity
        - name: owner
          kind: Text
          optional: true
          description: "Team or person accountable for this intent"
          order_weight: 1520
        - name: origin
          kind: Text
          optional: true
          description: "Change reference or ticket that introduced this intent"
          order_weight: 1530
        - name: valid_until
          kind: DateTime
          optional: true
          description: "Intent validity deadline; unset means permanent (overrides set this)"
          order_weight: 1540
